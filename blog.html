// --- redirection: lancer tôt, dès que le DOM est prêt
function redirectIfMobile() {
  const ua = navigator.userAgent.toLowerCase();
  const isMobileDevice = /android|iphone|ipad|ipod|blackberry|windows phone|opera mini|mobile/i.test(ua);
  const isSmallScreen = window.innerWidth <= 768;

  if (isMobileDevice || isSmallScreen) {
    // replace évite de revenir en arrière sur la page desktop
    window.location.replace("mobile.html");
  }
}
document.addEventListener("DOMContentLoaded", redirectIfMobile);
</script>
