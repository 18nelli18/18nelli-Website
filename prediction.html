<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Prédiction de l'avenir et plus encore</title>
  <style>
    /* ---------------- Base ---------------- */
    :root{
      --bg:#000;
      --fg:#fff;
      --mid:#cfcfcf;
      --dim:#9a9a9a;
      --line:#1a1a1a;
    }
    *{ box-sizing:border-box; }
    html,body{
      height:100%;
      margin:0;
      padding:0;
      background: var(--bg);
      color: var(--fg);
      font-family: system-ui, -apple-system, Segoe UI, Roboto, "Helvetica Neue", Arial, "Noto Sans", "Liberation Sans", sans-serif;
      letter-spacing: .2px;
    }

    /* ---------------- Splash prédiction ---------------- */
    body.splash-lock{ overflow:hidden; } /* évite le scroll pendant le splash */

    #prediction-screen{
      position: fixed; inset:0;
      background:#000;
      display:flex; align-items:center; justify-content:center;
      opacity:1; transition: opacity 2s ease;
      z-index:9999;
    }
    #prediction-screen img{
      max-width:80vw; max-height:80vh;
      filter: drop-shadow(0 0 12px rgba(255,255,255,.2));
    }
    #prediction-screen.fade-out{ opacity:0; pointer-events:none; }

    /* ---------------- UI Cadre rétro ---------------- */
    .chrome{
      position:relative;
      max-width:920px;
      height: min(86vh, 760px);
      margin: 24px auto;
      border: 2px solid var(--fg);
      background:
        linear-gradient(#0b0b0b,#000) padding-box,
        repeating-linear-gradient(90deg, #fff 0 1px, #000 1px 2px) border-box; /* bordure zébrée old-school */
      box-shadow:
        0 0 0 2px #000 inset,
        0 0 18px rgba(255,255,255,.08), 
        0 12px 40px rgba(0,0,0,.8);
      border-radius: 12px;
      overflow: hidden;
    }

    .titlebar{
      height:42px;
      display:flex; align-items:center; justify-content:space-between;
      padding: 0 10px;
      background:
        linear-gradient(#1c1c1c, #0d0d0d);
      border-bottom:1px solid #2b2b2b;
      text-transform: uppercase;
      font-size: 12px;
      letter-spacing: 1.8px;
    }
    .titlebar .lights{
      display:flex; gap:6px;
    }
    .led{
      width:12px;height:12px;border-radius:50%;
      background:#111; border:1px solid #444;
      box-shadow: 0 0 6px rgba(255,255,255,.1) inset, 0 0 8px rgba(255,255,255,.05);
    }
    .led.on{ background: radial-gradient(#fff,#bbb,#333); }

    .brand{
      display:flex; align-items:center; gap:10px; user-select:none;
    }
    .brand .logo{
      width:22px;height:22px; border:1px solid #fff; border-radius:4px;
      background:
        linear-gradient(180deg,#fff,#bbb 40%, #444 60%, #000);
      box-shadow: 0 0 0 1px #000 inset;
    }
    .brand .name{
      font-weight:700;
      filter: drop-shadow(0 1px 0 #000);
    }

    /* ---------------- Zone chat ---------------- */
    .chat{
      position:absolute; inset:42px 0 0 0; /* sous la titlebar */
      display:grid; grid-template-rows: 1fr auto;
      background:
        linear-gradient(180deg, rgba(255,255,255,.03), transparent 30%),
        #000;
    }

    /* scanlines CRT (subtile) */
    .chat:before{
      content:""; position:absolute; inset:0;
      background: repeating-linear-gradient(
        to bottom,
        rgba(255,255,255,.05), rgba(255,255,255,.05) 1px,
        transparent 1px, transparent 3px
      );
      mix-blend-mode: soft-light;
      pointer-events:none;
    }

    .messages{
      padding:16px;
      overflow:auto;
      scrollbar-width: thin;
      scrollbar-color: #7a7a7a #0a0a0a;
    }
    .messages::-webkit-scrollbar{ width:10px; }
    .messages::-webkit-scrollbar-thumb{ background:#7a7a7a; }
    .messages::-webkit-scrollbar-track{ background:#0a0a0a; }

    .bubble{
      max-width: 80%;
      padding:10px 12px;
      margin: 8px 0;
      border:1px solid var(--mid);
      background:
        linear-gradient(180deg,#111,#000);
      box-shadow:
        0 0 0 1px #000 inset,
        0 8px 24px rgba(0,0,0,.6);
      line-height:1.4;
      font-size:15px;
    }
    .bubble.user{
      margin-left:auto;
      border-color:#fff;
      background:
        linear-gradient(180deg,#1a1a1a,#000);
    }
    .bubble.bot{
      margin-right:auto;
      border-color:#bfbfbf;
    }

    .meta{
      display:block;
      margin-top:6px;
      color: var(--dim);
      font-size: 11px;
      letter-spacing: .4px;
      text-transform: uppercase;
    }

    /* ---------------- Zone input ---------------- */
    .composer{
      position:relative;
      display:flex; gap:8px;
      padding:12px;
      border-top:1px solid #2b2b2b;
      background:
        linear-gradient(#0e0e0e,#0a0a0a);
    }

    .input{
      flex:1;
      display:flex; align-items:center; gap:8px;
      border:1px solid #fff;
      background:
        linear-gradient(180deg,#151515,#0a0a0a);
      border-radius:8px;
      padding:10px 12px;
      box-shadow: 0 0 0 1px #000 inset;
    }
    .input input{
      flex:1;
      background:transparent;
      border:0; outline:0;
      color:var(--fg);
      font-size:15px;
    }

    .btn{
      min-width:120px;
      border:1px solid #fff;
      background:
        linear-gradient(180deg,#fff,#cfcfcf 60%, #8d8d8d 60%, #3a3a3a 90%, #000);
      color:#000;
      font-weight:700;
      text-transform: uppercase;
      letter-spacing:1px;
      border-radius:8px;
      padding:10px 14px;
      cursor:pointer;
      box-shadow:
        0 1px 0 #000 inset,
        0 6px 18px rgba(255,255,255,.15),
        0 0 0 2px #000;
      transition: transform .05s ease, filter .2s ease;
      user-select:none;
    }
    .btn:active{ transform: translateY(1px); }
    .btn:focus-visible{ outline:2px dashed #fff; outline-offset:2px; }

    /* ---------------- Footer barre d’état façon 2000s ---------------- */
    .status{
      position:fixed; left:0; right:0; bottom:0;
      height: 26px;
      display:flex; align-items:center; gap:12px;
      padding:0 12px;
      font-size:11px; letter-spacing:.5px;
      color:#bbb;
      border-top:1px solid #2b2b2b;
      background:
        linear-gradient(#0f0f0f,#0a0a0a);
      user-select:none;
    }
    .status .meter{
      width:130px; height:10px; border:1px solid #fff;
      box-shadow: 0 0 0 1px #000 inset;
      background:
        repeating-linear-gradient(90deg, #fff 0 6px, #000 6px 12px);
    }
    .status .sep{ color:#3a3a3a; }

    /* ---------------- A11y: préférences réduction anim ---------------- */
    @media (prefers-reduced-motion: reduce){
      #prediction-screen{ transition: none; }
      .btn{ transition: none; }
    }
  </style>
</head>
<body class="splash-lock">
  <!-- Écran de prédiction -->
  <div id="prediction-screen">
    <img src="./assets/img/prédiction.png" alt="Prédiction">
  </div>

  <!-- Fenêtre principale style "Flash 2000" -->
  <div class="chrome" role="application" aria-label="Chatbot rétro">
    <div class="titlebar" aria-hidden="true">
      <div class="brand">
        <div class="logo" aria-hidden="true"></div>
        <div class="name">PREDICT-BOX // v0.9b</div>
      </div>
      <div class="lights">
        <div class="led on" title="POWER"></div>
        <div class="led" title="NET"></div>
        <div class="led" title="SYNC"></div>
      </div>
    </div>

    <div class="chat">
      <div id="messages" class="messages" aria-live="polite" aria-label="Historique de la conversation">
        <div class="bubble bot">
          Bienvenue. Posez votre question.
          <span class="meta">bot • prêt</span>
        </div>
      </div>

      <form id="composer" class="composer" autocomplete="off">
        <div class="input" aria-label="Zone de saisie">
          <input id="text" type="text" name="q" placeholder="Écris ici ta question…" aria-label="Écrire un message"/>
        </div>
        <button class="btn" type="submit" aria-label="Envoyer">
          Envoyer
        </button>
      </form>
    </div>
  </div>

  <div class="status" aria-hidden="true">
    <span>État&nbsp;: CONNECTÉ</span><span class="sep">|</span>
    <span>Mode&nbsp;: NOIR &amp; BLANC</span><span class="sep">|</span>
    <div class="meter" title="Barre rétro purement décorative"></div>
  </div>

  <script>
    // ---------- Splash disparition en fondu ----------
    window.addEventListener('load', () => {
      const predictionScreen = document.getElementById('prediction-screen');
      setTimeout(() => {
        predictionScreen.classList.add('fade-out');
        setTimeout(() => {
          predictionScreen.style.display = 'none';
          document.body.classList.remove('splash-lock'); // réactive le scroll si besoin
          // Focus direct dans le champ de chat
          const input = document.getElementById('text');
          input && input.focus();
        }, 2000);
      }, 2000);
    });

    // ---------- Chatbot : répond toujours "Non, pas du tout" ----------
    const messages = document.getElementById('messages');
    const form = document.getElementById('composer');
    const input = document.getElementById('text');

    function stamp(){
      const d = new Date();
      const hh = String(d.getHours()).padStart(2,'0');
      const mm = String(d.getMinutes()).padStart(2,'0');
      return `${hh}:${mm}`;
    }

    function addBubble(text, who='user'){
      const div = document.createElement('div');
      div.className = `bubble ${who}`;
      div.innerText = text;
      const meta = document.createElement('span');
      meta.className = 'meta';
      meta.innerText = `${who === 'user' ? 'toi' : 'bot'} • ${stamp()}`;
      div.appendChild(document.createElement('br'));
      div.appendChild(meta);
      messages.appendChild(div);
      messages.scrollTop = messages.scrollHeight;
    }

    form.addEventListener('submit', (e) => {
      e.preventDefault();
      const val = (input.value || '').trim();
      if(!val) return;
      addBubble(val, 'user');
      input.value = '';

      // délai pour le "feeling" rétro
      setTimeout(() => {
        addBubble('Non, pas du tout', 'bot');
      }, 420);
    });

    // Entrée rapide sur Enter (déjà géré par submit) + Ctrl/Cmd+K pour clear
    window.addEventListener('keydown', (e)=>{
      if((e.ctrlKey || e.metaKey) && e.key.toLowerCase()==='k'){
        e.preventDefault();
        messages.innerHTML = '';
        addBubble('Historique effacé.', 'bot');
      }
    });
  </script>
</body>
</html>
